version: '3.8'

services:
  backend:
    build:
      context: ../
      dockerfile: deployment/Dockerfile.backend
    container_name: nextgen_backend
    environment:
      - DATABASE_URL=sqlite:///./nextgen_reads.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - backend_data:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deployment/Dockerfile.frontend
    container_name: nextgen_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  redis:
    image: redis:7-alpine
    container_name: nextgen_redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    container_name: nextgen_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  backend_data:
